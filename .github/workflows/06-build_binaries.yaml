---
name: Build release binaries

on:
  release:
    types: [published]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            make_build: build-linux-x64
            make_package: package-linux-x64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            make_build: build-linux-arm64
            make_package: package-linux-arm64
            use_cross: true

          - os: macos-13
            target: x86_64-apple-darwin
            make_build: build-macos-x64
            make_package: package-macos-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            make_build: build-macos-arm64
            make_package: package-macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            make_build: build-windows-x64
            make_package: package-windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: make install-cross

      - name: Build
        run: make ${{ matrix.make_build }}

      - name: Package
        run: make ${{ matrix.make_package }}

      - name: Upload to release
        shell: bash
        run: gh release upload ${{ github.event.release.tag_name }} dist/* --clobber
