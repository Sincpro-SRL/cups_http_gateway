---
name: "Prepare Rust environment"
description: "Install Rust toolchain and native OS dependencies"

inputs:
  environment:
    description: "Rust toolchain channel (e.g. stable, 1.75)"
    required: false
    default: "stable"

runs:
  using: "composite"
  steps:
    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: ${{ inputs.environment }}
        components: rustfmt, clippy

    - name: Setup Node.js (for prettier YAML formatting)
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install native Linux dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -q
        sudo apt-get install -y --no-install-recommends \
          libudev-dev pkg-config
